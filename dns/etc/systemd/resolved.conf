# /etc/systemd/resolved.conf
# Managed via dotfiles — do not edit manually
#
# DNS : Cloudflare primary, Quad9 fallback
# Features : DNS-over-TLS (DoT), DNSSEC, local cache

[Resolve]
# Primary: Cloudflare  |  Fallback: Quad9
DNS=1.1.1.1#cloudflare-dns.com 1.0.0.1#cloudflare-dns.com
FallbackDNS=9.9.9.9#dns.quad9.net 149.112.112.112#dns.quad9.net

# DNSSEC validation
DNSSEC=yes

# DNS over TLS
DNSOverTLS=yes

# Local caching (default: yes, explicit for clarity)
Cache=yes

# Prevent /etc/resolv.conf from overriding these settings
ReadEtcHosts=yes

- name: debloat for fedora
  dnf:
    name: "{{ item }}"
    state: absent
  loop:
    - gnome-calendar
    - gnome-contacts
    - gnome-calculator
    - gnome-clocks
    - mediawriter
    - totem
    - sushi
    - evince
    - simple-scan
    - snapshot
    - gnome-maps
    - gnome-boxes
    - gnome-characters
    - gnome-connections
    - loupe
    - gnome-tour
    - rhythmbox
    - anaconda-webui
    - firefox-langpacks
    - firefox
    - showtime
    - decibels
    - papers
    - gnome-terminal
    - unoconv
    - libreoffice-*
  any_errors_fatal: true
  when: ansible_facts['distribution'] == "Fedora"
  become: true

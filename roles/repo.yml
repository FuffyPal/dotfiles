- name: RPM Fusion (Free ve Non-Free) Repo setup andd enabled for fedora
  dnf:
    name:
      - "https://mirrors.rpmfusion.org/free/fedora/rpmfusion-free-release-{{ ansible_facts['distribution_major_version'] }}.noarch.rpm"
      - "https://mirrors.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-{{ ansible_facts['distribution_major_version'] }}.noarch.rpm"
    state: present
    disable_gpg_check: true
  become: true
  when: ansible_facts['distribution'] == "Fedora"

- name: Terra Repo added system for fedora
  ansible.builtin.yum_repository:
    name: terra
    description: Terra Repository for Fedora
    baseurl: "https://repos.fyralabs.com/terra{{ ansible_facts['distribution_major_version'] }}"
    gpgcheck: false
  become: true
  when: ansible_facts['distribution'] == "Fedora"

- name: terra-release package setup for fedora
  ansible.builtin.dnf:
    name: terra-release
    state: present
  become: true
  when: ansible_facts['distribution'] == "Fedora"

- name: Antigravity RPM repo added for fedora
  ansible.builtin.yum_repository:
    name: antigravity-rpm
    description: Antigravity RPM Repository
    baseurl: https://us-central1-yum.pkg.dev/projects/antigravity-auto-updater-dev/antigravity-rpm
    enabled: true
    gpgcheck: false
  become: true
  when: ansible_facts['distribution'] == "Fedora"

- name: VScode RPM repo added for fedora
  ansible.builtin.yum_repository:
    name: Visual Studio Code
    description: VScode RPM Repository
    baseurl: https://packages.microsoft.com/yumrepos/vscode
    enabled: true
    gpgcheck: true
    gpgkey: https://packages.microsoft.com/keys/microsoft.asc
  become: true
  when: ansible_facts['distribution'] == "Fedora"
